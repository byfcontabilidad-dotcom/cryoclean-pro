<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cryo Clean Pro | Limpieza Criogénica Profesional</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --azul: #00d4ff;
      --azul-oscuro: #0099cc;
      --negro: #0a0a0f;
      --gris: #111827;
      --gris-claro: #1f2937;
      --texto: #e5e7eb;
      --blanco: #ffffff;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--negro);
      color: var(--texto);
      scroll-behavior: smooth;
    }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,212,255,0.2);
      padding: 15px 40px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--azul); letter-spacing: 1px; }
    .logo span { color: var(--blanco); }
    .nav-links { display: flex; gap: 30px; list-style: none; }
    .nav-links a { color: var(--texto); text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
    .nav-links a:hover { color: var(--azul); }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0f 0%, #0d1b2a 50%, #0a1628 100%);
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 120px 20px 60px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, rgba(0,212,255,0.08) 0%, transparent 70%);
    }
    .hero-content { position: relative; z-index: 1; max-width: 800px; }
    .badge {
      display: inline-block; background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--azul); padding: 8px 20px; border-radius: 50px;
      font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px;
    }
    .hero h1 { font-size: 3.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
    .hero h1 .highlight { color: var(--azul); }
    .hero p { font-size: 1.2rem; color: #9ca3af; max-width: 600px; margin: 0 auto 40px; }
    .btn-primary {
      background: linear-gradient(135deg, var(--azul), var(--azul-oscuro));
      color: var(--negro); padding: 15px 40px; border-radius: 50px;
      font-size: 1rem; font-weight: 700; text-decoration: none;
      display: inline-block; transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 30px rgba(0,212,255,0.3);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 50px rgba(0,212,255,0.5); }
    .btn-secondary {
      background: transparent; color: var(--azul);
      border: 2px solid var(--azul); padding: 13px 35px;
      border-radius: 50px; font-size: 1rem; font-weight: 700;
      text-decoration: none; display: inline-block;
      transition: all 0.3s; margin-left: 15px;
    }
    .btn-secondary:hover { background: rgba(0,212,255,0.1); }

    /* ===== STATS ===== */
    .stats {
      background: var(--gris); padding: 50px 40px;
      display: flex; justify-content: center; gap: 80px; flex-wrap: wrap;
      border-top: 1px solid rgba(0,212,255,0.1);
      border-bottom: 1px solid rgba(0,212,255,0.1);
    }
    .stat { text-align: center; }
    .stat-num { font-size: 2.5rem; font-weight: 900; color: var(--azul); }
    .stat-label { font-size: 0.9rem; color: #6b7280; margin-top: 5px; }

    /* ===== SECCIONES ===== */
    section { padding: 80px 40px; }
    .section-title {
      text-align: center; margin-bottom: 60px;
    }
    .section-title h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; }
    .section-title h2 span { color: var(--azul); }
    .section-title p { color: #6b7280; font-size: 1rem; max-width: 500px; margin: 0 auto; }
    .divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--azul), transparent);
      margin: 15px auto;
    }

    /* ===== SERVICIOS ===== */
    #servicios { background: var(--negro); }
    .servicios-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px; max-width: 1100px; margin: 0 auto;
    }
    .servicio-card {
      background: var(--gris); border-radius: 16px;
      border: 1px solid rgba(0,212,255,0.1);
      padding: 30px; transition: transform 0.3s, border-color 0.3s;
      position: relative; overflow: hidden;
    }
    .servicio-card:hover { transform: translateY(-5px); border-color: rgba(0,212,255,0.4); }
    .servicio-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--azul), transparent);
    }
    .servicio-icon { font-size: 2.5rem; margin-bottom: 15px; }
    .servicio-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: var(--blanco); }
    .servicio-card p { color: #9ca3af; font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }
    .servicio-precio {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
    }
    .precio { font-size: 1.4rem; font-weight: 900; color: var(--azul); }
    .btn-servicio {
      background: rgba(0,212,255,0.1); color: var(--azul);
      border: 1px solid rgba(0,212,255,0.3); padding: 8px 16px;
      border-radius: 8px; font-size: 0.85rem; cursor: pointer;
      text-decoration: none; transition: all 0.3s;
    }
    .btn-servicio:hover { background: rgba(0,212,255,0.2); }

    /* ===== GALERÍA ===== */
    #galeria { background: var(--gris); }
    .galeria-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px; max-width: 1100px; margin: 0 auto;
    }
    .galeria-item {
      border-radius: 12px; overflow: hidden;
      aspect-ratio: 4/3; position: relative;
      border: 1px solid rgba(0,212,255,0.1);
      background: var(--gris-claro);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.3s;
    }
    .galeria-item:hover { transform: scale(1.02); }
    .galeria-item img { width: 100%; height: 100%; object-fit: cover; }
    .galeria-placeholder {
      text-align: center; color: #4b5563;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .galeria-placeholder span { font-size: 2rem; }
    .galeria-placeholder p { font-size: 0.8rem; }

    /* ===== VIDEOS ===== */
    #videos { background: var(--negro); }
    .videos-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px; max-width: 1100px; margin: 0 auto;
    }
    .video-card {
      background: var(--gris); border-radius: 16px;
      border: 1px solid rgba(0,212,255,0.1);
      overflow: hidden;
    }
    .video-placeholder {
      aspect-ratio: 16/9; background: var(--gris-claro);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; color: #4b5563;
    }
    .video-placeholder span { font-size: 3rem; }
    .video-card-info { padding: 20px; }
    .video-card-info h4 { color: var(--blanco); font-size: 1rem; margin-bottom: 8px; }
    .video-card-info p { color: #6b7280; font-size: 0.85rem; }
    /* Iframe de video real */
    .video-card iframe { width: 100%; aspect-ratio: 16/9; border: none; }

    /* ===== TESTIMONIOS ===== */
    #testimonios { background: var(--gris); }
    .testimonios-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px; max-width: 1000px; margin: 0 auto;
    }
    .testimonio {
      background: var(--negro); border-radius: 16px;
      padding: 30px; border: 1px solid rgba(0,212,255,0.1);
    }
    .estrellas { color: #fbbf24; font-size: 1.1rem; margin-bottom: 15px; }
    .testimonio p { color: #9ca3af; font-size: 0.95rem; line-height: 1.7; font-style: italic; margin-bottom: 20px; }
    .cliente { display: flex; align-items: center; gap: 12px; }
    .cliente-avatar {
      width: 45px; height: 45px; border-radius: 50%;
      background: linear-gradient(135deg, var(--azul), var(--azul-oscuro));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--negro); font-size: 1.1rem;
    }
    .cliente-info h5 { color: var(--blanco); font-size: 0.95rem; }
    .cliente-info span { color: #6b7280;
